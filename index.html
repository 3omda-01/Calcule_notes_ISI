<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalculMoyenne — Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0d0d0d}
.term-wrap{width:100%;min-height:100vh;background:#0d0d0d;font-family:'JetBrains Mono',monospace;display:flex;flex-direction:column}
.term-bar{background:#1c1c1e;padding:10px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.dot{width:12px;height:12px;border-radius:50%}
.d-red{background:#ff5f57}.d-yellow{background:#febc2e}.d-green{background:#28c840}
.term-title{flex:1;text-align:center;font-size:11px;color:#555;letter-spacing:0.05em}
.term-body{flex:1;background:#0d0d0d;padding:20px 24px 24px;cursor:text;overflow-y:auto}
.line{font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-word}
.c-dim{color:#444}.c-gray{color:#666}.c-white{color:#d4d4d4}
.c-green{color:#4ec94e}.c-teal{color:#4fc1a6}.c-blue{color:#569cd6}
.c-yellow{color:#dcdcaa}.c-orange{color:#ce9178}.c-purple{color:#c586c0}
.c-red{color:#f44747}.c-header{color:#9cdcfe}
.input-row{display:flex;align-items:center;margin-top:2px}
.term-input{background:none;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:13px;color:#d4d4d4;flex:1;caret-color:#d4d4d4;padding:0;line-height:1.7;width:100%}
</style>
</head>
<body>
<div class="term-wrap">
  <div class="term-bar">
    <div class="dot d-red"></div>
    <div class="dot d-yellow"></div>
    <div class="dot d-green"></div>
    <div class="term-title">java CalculMoyenne.java — bash</div>
  </div>
  <div class="term-body" id="tb" onclick="focusInput()">
    <div id="output"></div>
    <div class="input-row" id="input-row" style="display:none">
      <span id="prompt-sym"></span>
      <input class="term-input" id="ti" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="onKey(event)">
    </div>
  </div>
</div>

<script>
const out=document.getElementById('output');
const inputRow=document.getElementById('input-row');
const ti=document.getElementById('ti');
const promptSym=document.getElementById('prompt-sym');
let items=[],resolve=null;

function focusInput(){if(inputRow.style.display!=='none')ti.focus();}

function print(html){
  const d=document.createElement('div');
  d.className='line';d.innerHTML=html;
  out.appendChild(d);
  const tb=document.getElementById('tb');
  tb.scrollTop=tb.scrollHeight;
}

function blank(){print('');}

function ask(promptText){
  return new Promise(r=>{
    resolve=r;
    promptSym.innerHTML=promptText;
    inputRow.style.display='flex';
    ti.value='';ti.focus();
    const tb=document.getElementById('tb');
    tb.scrollTop=tb.scrollHeight;
  });
}

function onKey(e){
  if(e.key==='Enter'){
    const val=ti.value.trim();
    print(promptSym.innerHTML+'<span class="c-white">'+escH(val)+'</span>');
    inputRow.style.display='none';
    if(resolve){const r=resolve;resolve=null;r(val);}
  }
}

function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function scoreColor(v){return v>=14?'c-green':v>=10?'c-yellow':'c-red';}
function pad(s,len){const str=String(s);return str+' '.repeat(Math.max(0,len-str.length));}

function bar(v,len){
  len=len||18;
  const filled=Math.round((v/20)*len);
  return'<span class="'+scoreColor(v)+'">'+'█'.repeat(filled)+'░'.repeat(len-filled)+'</span>';
}

function calcMoy(m){
  const tp=parseFloat(m.tp),ds=parseFloat(m.ds),ex=parseFloat(m.ex),cc=parseFloat(m.cc);
  if(m.type==='1'){if(isNaN(tp)||isNaN(ds)||isNaN(ex))return null;return 0.15*tp+0.15*ds+0.70*ex;}
  if(m.type==='2'){if(isNaN(ds)||isNaN(ex))return null;return 0.30*ds+0.70*ex;}
  if(isNaN(cc)||isNaN(ds))return null;return 0.80*cc+0.20*ds;
}

function getMention(a){
  if(a>=16)return['✦ Très Bien','c-green'];
  if(a>=14)return['✦ Bien','c-teal'];
  if(a>=12)return['✦ Assez Bien','c-blue'];
  if(a>=10)return['✦ Passable','c-yellow'];
  return['✦ Insuffisant','c-red'];
}

async function readNote(label){
  while(true){
    const v=await ask('    <span class="c-yellow">'+label+' (0–20) : </span>');
    const n=parseFloat(v);
    if(!isNaN(n)&&n>=0&&n<=20)return n;
    print('    <span class="c-red">⚠  Valeur invalide. Entrez un nombre entre 0 et 20.</span>');
  }
}

async function readInt(min,max,promptHtml){
  while(true){
    const v=await ask(promptHtml);
    const n=parseInt(v);
    if(!isNaN(n)&&n>=min&&n<=max)return n;
    print('    <span class="c-red">⚠  Entrez un entier entre '+min+' et '+max+'.</span>');
  }
}

async function main(){
  items=[];
  await sleep(200);
  print('<span class="c-purple">╔══════════════════════════════════════════════════════════════════╗</span>');
  print('<span class="c-purple">║</span>        <span class="c-header">CALCULATEUR DE MOYENNE</span> <span class="c-dim">–</span> <span class="c-white">MÊMES COEFFICIENTS</span>              <span class="c-purple">║</span>');
  print('<span class="c-purple">║</span>  <span class="c-dim">•</span> <span class="c-teal">[1] Avec TP</span>    <span class="c-dim">:</span> <span class="c-yellow">TP 15%</span> <span class="c-dim">|</span> <span class="c-yellow">DS 15%</span> <span class="c-dim">|</span> <span class="c-yellow">Examen 70%</span>            <span class="c-purple">║</span>');
  print('<span class="c-purple">║</span>  <span class="c-dim">•</span> <span class="c-teal">[2] Sans TP</span>    <span class="c-dim">:</span>          <span class="c-yellow">DS 30%</span> <span class="c-dim">|</span> <span class="c-yellow">Examen 70%</span>            <span class="c-purple">║</span>');
  print('<span class="c-purple">║</span>  <span class="c-dim">•</span> <span class="c-teal">[3] Universelle</span><span class="c-dim">:</span>          <span class="c-yellow">CC 80%</span> <span class="c-dim">|</span> <span class="c-yellow">DS    20%</span>            <span class="c-purple">║</span>');
  print('<span class="c-purple">╚══════════════════════════════════════════════════════════════════╝</span>');
  blank();

  const n=await readInt(1,30,'<span class="c-white">Nombre de matières : </span>');

  for(let i=1;i<=n;i++){
    blank();
    print('<span class="c-dim">── </span><span class="c-blue">Matière '+i+' / '+n+'</span><span class="c-dim"> ─────────────────────────────────</span>');
    const nom=await ask('  <span class="c-white">Nom : </span>');
    blank();
    print('  Type :');
    print('    <span class="c-purple">[1]</span> <span class="c-teal">Avec TP</span>      <span class="c-dim">→</span> <span class="c-yellow">TP 15% + DS 15% + Examen 70%</span>');
    print('    <span class="c-purple">[2]</span> <span class="c-teal">Sans TP</span>      <span class="c-dim">→</span> <span class="c-yellow">DS 30% + Examen 70%</span>');
    print('    <span class="c-purple">[3]</span> <span class="c-teal">Universelle</span>  <span class="c-dim">→</span> <span class="c-yellow">CC 80% + DS 20%</span>');
    const type=String(await readInt(1,3,'  <span class="c-blue">Choix (1/2/3) : </span>'));
    let m={nom,type,tp:'',ds:'',ex:'',cc:''};
    if(type==='1'){m.tp=await readNote('Note TP    ');m.ds=await readNote('Note DS    ');m.ex=await readNote('Note Examen');}
    else if(type==='2'){m.ds=await readNote('Note DS    ');m.ex=await readNote('Note Examen');}
    else{m.cc=await readNote('Note CC    ');m.ds=await readNote('Note DS    ');}
    const moy=calcMoy(m);
    const sc=scoreColor(moy);
    print('    <span class="c-dim">↳ moyenne :</span> <span class="'+sc+'">'+moy.toFixed(2)+' / 20</span>  '+bar(moy,14));
    items.push(m);
  }

  blank();await sleep(150);
  print('<span class="c-purple">╔══════════════════════════════════════════════════════════════════╗</span>');
  print('<span class="c-purple">║</span>                <span class="c-header">RÉCAPITULATIF DES NOTES</span>                        <span class="c-purple">║</span>');
  print('<span class="c-purple">╚══════════════════════════════════════════════════════════════════╝</span>');
  blank();

  const TAG={1:'<span class="c-purple">TP </span>',2:'<span class="c-teal">DSE</span>',3:'<span class="c-orange">UNI</span>'};
  let sum=0;
  items.forEach(function(m){
    const v=calcMoy(m);sum+=v;
    const sc=scoreColor(v);
    const name=pad(m.nom,20);
    let notes='';
    if(m.type==='1') notes='<span class="c-dim">tp</span><span class="c-yellow">'+String(m.tp).padStart(5)+'</span>  <span class="c-dim">ds</span><span class="c-yellow">'+String(m.ds).padStart(5)+'</span>  <span class="c-dim">ex</span><span class="c-yellow">'+String(m.ex).padStart(5)+'</span>';
    else if(m.type==='2') notes='<span class="c-dim">ds</span><span class="c-yellow">'+String(m.ds).padStart(5)+'</span>  <span class="c-dim">ex</span><span class="c-yellow">'+String(m.ex).padStart(5)+'</span>               ';
    else notes='<span class="c-dim">cc</span><span class="c-yellow">'+String(m.cc).padStart(5)+'</span>  <span class="c-dim">ds</span><span class="c-yellow">'+String(m.ds).padStart(5)+'</span>               ';
    print('  '+TAG[m.type]+'  <span class="c-white">'+name+'</span>  '+notes+'  '+bar(v)+'  <span class="'+sc+'">'+v.toFixed(2)+'</span>');
  });

  const avg=sum/items.length;
  const mention=getMention(avg);
  const mlabel=mention[0];const mc=mention[1];
  blank();
  print('<span class="c-dim">──────────────────────────────────────────────────────────────────</span>');
  print('  <span class="c-dim">Moyenne générale</span>   '+bar(avg,22)+'  <span class="'+scoreColor(avg)+'">'+avg.toFixed(2)+' / 20</span>');
  print('  <span class="c-dim">Mention          </span>   <span class="'+mc+'">'+mlabel+'</span>');
  print('<span class="c-dim">──────────────────────────────────────────────────────────────────</span>');
  blank();
  print('<span class="c-dim">Process finished with exit code</span> <span class="c-teal">0</span>');
  blank();

  const again=await ask('<span class="c-dim">Relancer ? (o/n) : </span>');
  if(again.toLowerCase()==='o'||again.toLowerCase()==='oui'){
    blank();
    print('<span class="c-dim">────────────────────────────── restart ───────────────────────────</span>');
    blank();
    await main();
  } else {
    print('<span class="c-dim">Session terminée.</span>');
    blank();
  }
}

main();
</script>
</body>
</html>
